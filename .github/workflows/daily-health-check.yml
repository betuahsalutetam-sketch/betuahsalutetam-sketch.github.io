name: Daily Website Health Check

on:
  schedule:
    - cron: '0 1 * * *'  # Jam 08:00 WIB (UTC+7 = UTC 01:00)
  workflow_dispatch:       # Bisa dijalankan manual dari GitHub

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check Homepage
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://salutetambetuah.id)
          echo "Homepage: $STATUS"
          if [ "$STATUS" != "200" ]; then echo "ERROR: Homepage down!"; exit 1; fi

      - name: Check All Sitemap URLs
        run: |
          FAILED=0
          URLS=(
            "https://salutetambetuah.id/"
            "https://salutetambetuah.id/blog/"
            "https://salutetambetuah.id/blog/salut-ut-samarinda.html"
            "https://salutetambetuah.id/blog/apa-itu-salut-ut-panduan-lengkap.html"
            "https://salutetambetuah.id/blog/salut-etam-betuah-profil.html"
            "https://salutetambetuah.id/blog/daftar-ut-samarinda-2026.html"
            "https://salutetambetuah.id/blog/rpl-ut-kaltim.html"
            "https://salutetambetuah.id/blog/biaya-kuliah-ut-samarinda.html"
            "https://salutetambetuah.id/blog/wisuda-ut-samarinda.html"
            "https://salutetambetuah.id/blog/tips-lulus-ut-tepat-waktu-fresh-graduate.html"
            "https://salutetambetuah.id/blog/panduan-registrasi-matkul-ut-2026.html"
            "https://salutetambetuah.id/blog/keuntungan-kuliah-universitas-terbuka.html"
            "https://salutetambetuah.id/kta.html"
          )
          for URL in "${URLS[@]}"; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            echo "$CODE — $URL"
            if [ "$CODE" != "200" ]; then
              echo "BROKEN: $URL"
              FAILED=1
            fi
          done
          if [ "$FAILED" = "1" ]; then
            echo "Ada URL yang 404! Cek segera."
            exit 1
          fi
          echo "Semua ${{#URLS[@]}} URL sehat (200 OK)"

      - name: Check Page Load Speed
        run: |
          TIME=$(curl -s -o /dev/null -w "%{time_total}" https://salutetambetuah.id)
          echo "Load time homepage: ${TIME}s"
          # Peringatan jika lebih dari 3 detik
          WARN=$(echo "$TIME > 3.0" | bc -l)
          if [ "$WARN" = "1" ]; then
            echo "WARNING: Homepage lambat (${TIME}s > 3s)"
          fi

      - name: Check Sitemap XML Valid
        run: |
          SITEMAP=$(curl -s https://salutetambetuah.id/sitemap.xml)
          if echo "$SITEMAP" | grep -q "<urlset"; then
            COUNT=$(echo "$SITEMAP" | grep -c "<loc>")
            echo "Sitemap valid — $COUNT URLs ditemukan"
          else
            echo "ERROR: Sitemap tidak valid!"
            exit 1
          fi

      - name: Success Summary
        run: |
          echo "========================================"
          echo "✅ HEALTH CHECK PASSED — salutetambetuah.id"
          echo "Waktu: $(TZ='Asia/Makassar' date '+%d %B %Y %H:%M WIT')"
          echo "========================================"
