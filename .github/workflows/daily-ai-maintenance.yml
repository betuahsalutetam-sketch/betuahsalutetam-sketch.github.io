name: Daily AI Maintenance — Salut Etam Betuah

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  maintenance:
    name: Daily Content & SEO Update
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests --quiet

      - name: Run daily maintenance script
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          GOOGLE_PLACE_ID: ${{ secrets.GOOGLE_PLACE_ID }}
        run: python3 scripts/daily_maintenance.py

      - name: Update sitemap lastmod
        run: |
          TODAY=$(date +%Y-%m-%d)
          [ -f sitemap.xml ] && sed -i "s|<lastmod>[0-9-]*</lastmod>|<lastmod>$TODAY</lastmod>|g" sitemap.xml
          echo "sitemap: $TODAY"

      - name: Update dateModified in HTML files
        run: |
          TODAY=$(date +%Y-%m-%d)
          # PROTEKSI: blog/index.html dan blog-section.html DIKECUALIKAN
          for f in index.html kta.html; do
            [ -f "$f" ] && sed -i "s/\"dateModified\": \"[0-9-]*\"/\"dateModified\": \"$TODAY\"/g" "$f"
          done
          for f in blog/*.html; do
            fname=$(basename "$f")
            if [ "$fname" != "index.html" ] && [ "$fname" != "blog-section.html" ]; then
              sed -i "s/\"dateModified\": \"[0-9-]*\"/\"dateModified\": \"$TODAY\"/g" "$f"
            fi
          done
          echo "dateModified: $TODAY (blog/index.html dikecualikan)"

      - name: PROTEKSI blog/index.html
        run: |
          echo "=== CEK INTEGRITAS blog/index.html ==="
          CARD_COUNT=$(grep -c "card-hover bg-white rounded-2xl overflow-hidden" blog/index.html 2>/dev/null || echo 0)
          echo "Kartu artikel: $CARD_COUNT"
          RESTORE=0
          if [ "$CARD_COUNT" -lt 16 ]; then
            echo "PERINGATAN: hanya $CARD_COUNT kartu (minimum 16)"
            RESTORE=1
          fi
          for slug in "cara-bayar-spp-ut-samarinda-2026.html" "beasiswa-ut-samarinda-2026.html" "faq-mahasiswa-ut-samarinda-2026.html" "syarat-daftar-ut-2026.html" "panduan-ujian-ut-samarinda-2026.html"; do
            if ! grep -q "$slug" blog/index.html 2>/dev/null; then
              echo "HILANG: $slug"
              RESTORE=1
            fi
          done
          if [ "$RESTORE" = "1" ]; then
            git checkout HEAD -- blog/index.html
            echo "blog/index.html di-restore ke versi aman"
          else
            echo "blog/index.html OK"
          fi

      - name: Update maintenance log
        run: |
          printf "\n## %s (%s)\n- Sitemap & dateModified updated\n- blog/index.html dilindungi\n" \
            "$(date +%Y-%m-%d)" "$(date +%A)" >> MAINTENANCE_LOG.md

      - name: Commit and push
        run: |
          git config user.name "Salut Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "chore: daily update $(date +%Y-%m-%d)"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
