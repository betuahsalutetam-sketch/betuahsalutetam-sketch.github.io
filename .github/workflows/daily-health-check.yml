name: Daily Website Health Check

on:
  schedule:
    - cron: '0 1 * * *'  # Jam 08:00 WIB
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check All 20 URLs
        run: |
          FAILED=0
          URLS=(
            "https://salutetambetuah.id/"
            "https://salutetambetuah.id/blog/"
            "https://salutetambetuah.id/blog/salut-ut-samarinda.html"
            "https://salutetambetuah.id/blog/apa-itu-salut-ut-panduan-lengkap.html"
            "https://salutetambetuah.id/blog/salut-etam-betuah-profil.html"
            "https://salutetambetuah.id/blog/daftar-ut-samarinda-2026.html"
            "https://salutetambetuah.id/blog/syarat-daftar-ut-2026.html"
            "https://salutetambetuah.id/blog/rpl-ut-kaltim.html"
            "https://salutetambetuah.id/blog/biaya-kuliah-ut-samarinda.html"
            "https://salutetambetuah.id/blog/cara-bayar-spp-ut-samarinda-2026.html"
            "https://salutetambetuah.id/blog/beasiswa-ut-samarinda-2026.html"
            "https://salutetambetuah.id/blog/wisuda-ut-samarinda.html"
            "https://salutetambetuah.id/blog/jadwal-wisuda-ut-2026-kaltim.html"
            "https://salutetambetuah.id/blog/tips-lulus-ut-tepat-waktu-fresh-graduate.html"
            "https://salutetambetuah.id/blog/panduan-registrasi-matkul-ut-2026.html"
            "https://salutetambetuah.id/blog/panduan-ujian-ut-samarinda-2026.html"
            "https://salutetambetuah.id/blog/keuntungan-kuliah-universitas-terbuka.html"
            "https://salutetambetuah.id/blog/prodi-terpopuler-ut-samarinda-2026.html"
            "https://salutetambetuah.id/blog/faq-mahasiswa-ut-samarinda-2026.html"
            "https://salutetambetuah.id/kta.html"
          )
          for URL in "${URLS[@]}"; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$CODE" = "200" ]; then
              echo "✅ $CODE — $URL"
            else
              echo "❌ $CODE — $URL"
              FAILED=1
            fi
          done
          [ "$FAILED" = "1" ] && echo "::error::Ada URL error!" && exit 1
          echo "✅ Semua 20 URL sehat"

      - name: Check Performance & Size
        run: |
          TTFB=$(curl -s -o /dev/null -w "%{time_starttransfer}" https://salutetambetuah.id)
          SIZE=$(curl -s -o /dev/null -w "%{size_download}" https://salutetambetuah.id)
          echo "⚡ TTFB: ${TTFB}s | Size: ${SIZE}B"
          python3 -c "
          t=float('$TTFB'); s=int('$SIZE')
          print('✅ Speed OK' if t<2 else f'::warning::Lambat {t}s')
          print('✅ Size OK' if s<210000 else f'::warning::Besar {s}B')
          "

      - name: Check Sitemap (20 URLs)
        run: |
          COUNT=$(curl -s https://salutetambetuah.id/sitemap.xml | grep -c "<loc>")
          echo "📍 Sitemap: $COUNT URLs"
          [ "$COUNT" -lt "18" ] && echo "::warning::Sitemap kurang dari 18 URLs" || echo "✅ Sitemap OK"

      - name: Check WebP Images
        run: |
          for img in wisuda-2.webp wisuda-1.webp kantor-luar.webp og-image.jpg; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://salutetambetuah.id/assets/images/$img")
            [ "$CODE" = "200" ] && echo "✅ $img" || echo "❌ $img ($CODE)"
          done

      - name: Check GA4 & GSC Tags
        run: |
          HTML=$(curl -s https://salutetambetuah.id)
          GA=$(echo "$HTML" | grep -c "G-HD1W7XBQQ8" || echo 0)
          GSC=$(echo "$HTML" | grep -c "8eb66f398c4e0dce" || echo 0)
          echo "GA4 refs: $GA | GSC: $GSC"
          [ "$GA" -gt 0 ] && echo "✅ GA4 aktif" || echo "::warning::GA4 tidak ditemukan"
          [ "$GSC" -gt 0 ] && echo "✅ GSC verified" || echo "::warning::GSC tag hilang"

      - name: Summary
        run: |
          echo "========================================"
          echo "✅ HEALTH CHECK — salutetambetuah.id"
          echo "🕐 $(TZ='Asia/Makassar' date '+%A, %d %B %Y %H:%M WITA')"
          echo "📊 20 URLs · GA4 G-HD1W7XBQQ8 · Sitemap 20 URLs"
          echo "========================================"
