name: Daily Website Health Check

on:
  schedule:
    - cron: '0 1 * * *'  # Jam 08:00 WIB (UTC+7 = UTC 01:00)
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check All URLs (14 pages)
        run: |
          FAILED=0
          URLS=(
            "https://salutetambetuah.id/"
            "https://salutetambetuah.id/blog/"
            "https://salutetambetuah.id/blog/salut-ut-samarinda.html"
            "https://salutetambetuah.id/blog/apa-itu-salut-ut-panduan-lengkap.html"
            "https://salutetambetuah.id/blog/salut-etam-betuah-profil.html"
            "https://salutetambetuah.id/blog/daftar-ut-samarinda-2026.html"
            "https://salutetambetuah.id/blog/rpl-ut-kaltim.html"
            "https://salutetambetuah.id/blog/biaya-kuliah-ut-samarinda.html"
            "https://salutetambetuah.id/blog/wisuda-ut-samarinda.html"
            "https://salutetambetuah.id/blog/jadwal-wisuda-ut-2026-kaltim.html"
            "https://salutetambetuah.id/blog/tips-lulus-ut-tepat-waktu-fresh-graduate.html"
            "https://salutetambetuah.id/blog/panduan-registrasi-matkul-ut-2026.html"
            "https://salutetambetuah.id/blog/keuntungan-kuliah-universitas-terbuka.html"
            "https://salutetambetuah.id/kta.html"
          )
          for URL in "${URLS[@]}"; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$CODE" = "200" ]; then
              echo "✅ $CODE — $URL"
            else
              echo "❌ $CODE — $URL"
              FAILED=1
            fi
          done
          if [ "$FAILED" = "1" ]; then
            echo "::error::Ada URL yang error! Cek segera salutetambetuah.id"
            exit 1
          fi
          echo "✅ Semua ${#URLS[@]} URL sehat"

      - name: Check Page Speed (Homepage)
        run: |
          TIME=$(curl -s -o /dev/null -w "%{time_total}" https://salutetambetuah.id)
          SIZE=$(curl -s -o /dev/null -w "%{size_download}" https://salutetambetuah.id)
          echo "🏎️  Load time: ${TIME}s | Size: ${SIZE} bytes"
          python3 -c "
          t = float('$TIME')
          if t > 3.0:
              print(f'::warning::Homepage lambat: {t}s (target < 3s)')
          else:
              print(f'✅ Speed OK: {t}s')
          "

      - name: Check Sitemap Valid (14 URLs)
        run: |
          SITEMAP=$(curl -s https://salutetambetuah.id/sitemap.xml)
          COUNT=$(echo "$SITEMAP" | grep -c "<loc>" || echo 0)
          echo "📍 Sitemap URLs: $COUNT"
          if [ "$COUNT" -lt "12" ]; then
            echo "::warning::Sitemap hanya $COUNT URLs (expected 14+)"
          else
            echo "✅ Sitemap OK — $COUNT URLs"
          fi

      - name: Check WebP Images
        run: |
          for img in wisuda-2.webp wisuda-1.webp kantor-luar.webp; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://salutetambetuah.id/assets/images/$img")
            echo "$CODE — $img"
          done

      - name: Summary
        run: |
          echo "================================================"
          echo "✅ HEALTH CHECK SELESAI — salutetambetuah.id"
          echo "🕐 $(TZ='Asia/Makassar' date '+%A, %d %B %Y %H:%M WITA')"
          echo "================================================"
